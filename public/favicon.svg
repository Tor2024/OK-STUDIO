<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Черный фон (как в Logo.tsx) -->
  <rect width="100" height="100" fill="#141414"/>
  
  <!-- Светлая рамка -->
  <rect x="2" y="2" width="96" height="96" fill="none" stroke="#C5C5C5" stroke-opacity="0.2" stroke-width="1"/>
  
  <!-- Иконка процессора (Cpu from lucide-react) -->
  <g transform="translate(50, 50) scale(2.2)">
    <!-- CPU icon paths -->
    <rect x="-6" y="-6" width="12" height="12" rx="1" fill="none" stroke="white" stroke-width="1.5"/>
    <rect x="-3" y="-3" width="6" height="6" rx="0.5" fill="none" stroke="white" stroke-width="1.5"/>
    
    <!-- CPU pins (top) -->
    <line x1="-4" y1="-6" x2="-4" y2="-9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="-6" x2="0" y2="-9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="-6" x2="4" y2="-9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- CPU pins (bottom) -->
    <line x1="-4" y1="6" x2="-4" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="6" x2="0" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="4" y1="6" x2="4" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- CPU pins (left) -->
    <line x1="-6" y1="-4" x2="-9" y2="-4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="-9" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="4" x2="-9" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- CPU pins (right) -->
    <line x1="6" y1="-4" x2="9" y2="-4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="0" x2="9" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="4" x2="9" y2="4" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Декоративные углы (как в Logo.tsx) -->
  <line x1="8" y1="8" x2="8" y2="15" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="8" y1="8" x2="15" y2="8" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  
  <line x1="92" y1="92" x2="92" y2="85" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  <line x1="92" y1="92" x2="85" y2="92" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
  
  <!-- Зеленый бейдж v3 (как в Logo.tsx) -->
  <circle cx="78" cy="22" r="10" fill="#616752" stroke="white" stroke-opacity="0.4" stroke-width="1"/>
  <text x="78" y="25" font-family="monospace" font-size="9" font-weight="bold" fill="white" text-anchor="middle">v3</text>
</svg>
